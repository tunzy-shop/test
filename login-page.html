<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TUNZY SUB 4 YOU</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<meta name="theme-color" content="#0A2540">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-circle">
                <img src="assets/my-logo.jpg" alt="TUNZY">
            </div>
            <h1>TUNZY SUB 4 YOU</h1>

            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loading">Processing...</div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="resetPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    uid: user.uid
                }));
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('userEmail', user.email);
                
                if (localStorage.getItem('userBalance') === null) {
                    localStorage.setItem('userBalance', '0');
                }
                
                window.location.href = 'dashboard.html';
            }
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    uid: user.uid
                }));
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('userEmail', user.email);
                
                if (localStorage.getItem('userBalance') === null) {
                    localStorage.setItem('userBalance', '0');
                }
                
                document.getElementById('loading').style.display = 'none';
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                
                let errorMessage = 'Invalid email or password';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Try again later';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Check your internet connection';
                }
                
                document.getElementById('errorMessage').textContent = errorMessage;
            }
        });

        // Forgot password
        async function resetPassword() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Please enter your email address first');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                await auth.sendPasswordResetEmail(email);
                document.getElementById('loading').style.display = 'none';
                alert(`✅ Password reset email sent to ${email}\n\nCheck your inbox and follow the instructions.`);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                let errorMessage = 'Unable to send reset email';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                }
                alert(`❌ ${errorMessage}`);
            }
        }
    </script>
</body>
</html>
